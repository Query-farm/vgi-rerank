name: CI

on:
  push:
    branches: [main]
    paths-ignore: ['README.md']
  pull_request:
    branches: [main]
    paths-ignore: ['README.md']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      # Install from PyPI rather than the local ../vgi-python path used for
      # `uv run` during development, so CI is self-contained.
      - name: Install dependencies
        run: |
          uv venv
          uv pip install vgi-python "fastembed>=0.5" pyarrow pytest
          uv pip install -e . --no-deps

      # Pre-warm the fastembed cache so the model download happens once, here,
      # rather than inline during the first test (and so the model-gated tests run).
      - name: Warm the reranker model cache
        run: uv run --no-sync python -c "from vgi_rerank import models; models.warm_up()"

      - name: Run tests
        run: uv run --no-sync pytest

  e2e:
    name: SQL end-to-end (haybarn)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python 3.13
        run: uv python install 3.13

      # Self-contained: install the worker's runtime deps into a venv from PyPI
      # (not the local ../vgi-python dev path), so the worker can be launched as
      # `.venv/bin/python rerank_worker.py` (plain python ignores the PEP-723
      # header that pins the dev path).
      - name: Install worker dependencies
        run: |
          uv venv
          uv pip install vgi-python "fastembed>=0.5" pyarrow
          uv pip install -e . --no-deps

      - name: Warm the reranker model cache
        run: uv run --no-sync python -c "from vgi_rerank import models; models.warm_up()"

      - name: Install haybarn-unittest
        run: |
          uv tool install haybarn-unittest
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run SQL end-to-end tests
        run: make test-sql WORKER_STDIO=".venv/bin/python rerank_worker.py"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install tooling
        run: |
          uv venv
          uv pip install vgi-python "fastembed>=0.5" pyarrow ruff mypy
          uv pip install -e . --no-deps

      - name: Check linting
        run: uv run --no-sync ruff check .

      - name: Type check (mypy)
        run: uv run --no-sync mypy vgi_rerank
